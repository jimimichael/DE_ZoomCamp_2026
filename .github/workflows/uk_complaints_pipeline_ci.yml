name: UK Complaints Pipeline CI

on:
  push:
    paths:
      - 'uk-financial-complaints-pipeline/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'uk-financial-complaints-pipeline/**'
      - '.github/workflows/**'

jobs:
  validate:
    name: Validate UK Complaints Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DLT dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r uk-financial-complaints-pipeline/dlt/requirements.txt

      - name: Install dbt dependencies
        run: |
          python -m pip install -r uk-financial-complaints-pipeline/dbt/requirements.txt

      - name: Validate Python scripts
        run: |
          python -m py_compile uk-financial-complaints-pipeline/dlt/complaints_pipeline_complete.py
          python -m py_compile uk-financial-complaints-pipeline/dlt/load_to_bigquery.py
          python -m py_compile uk-financial-complaints-pipeline/dlt/create_combined_table.py

      - name: Fetch dbt packages
        run: |
          cd uk-financial-complaints-pipeline/dbt
          dbt deps --profiles-dir .

      - name: Compile dbt models (optional)
        if: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
        run: |
          mkdir -p /app/secrets
          printf '%s' "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /app/secrets/terraform-sa-key.json
          cd uk-financial-complaints-pipeline/dbt
          dbt compile --profiles-dir . --project-dir .
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/terraform-sa-key.json
